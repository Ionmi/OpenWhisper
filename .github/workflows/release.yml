name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*'
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Create self-signed certificate for code signing
        run: |
          # Create a temporary keychain for CI
          security create-keychain -p "" /tmp/build.keychain
          security default-keychain -s /tmp/build.keychain
          security unlock-keychain -p "" /tmp/build.keychain
          security set-keychain-settings /tmp/build.keychain

          # Generate a self-signed certificate for code signing
          cat > /tmp/cert.conf <<CERTEOF
          [req]
          distinguished_name = req_dn
          x509_extensions = codesign
          prompt = no
          [req_dn]
          CN = OpenWhisper Release
          O = OpenWhisper
          [codesign]
          keyUsage = digitalSignature
          extendedKeyUsage = codeSigning
          CERTEOF
          openssl req -x509 -newkey rsa:2048 -keyout /tmp/key.pem -out /tmp/cert.pem \
            -days 3650 -nodes -config /tmp/cert.conf
          openssl pkcs12 -export -out /tmp/cert.p12 -inkey /tmp/key.pem -in /tmp/cert.pem \
            -passout pass:temp123 -legacy

          # Import certificate into keychain
          security import /tmp/cert.p12 -k /tmp/build.keychain -P temp123 -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" /tmp/build.keychain

          # Get the identity for use in build
          IDENTITY=$(security find-identity -v -p codesigning /tmp/build.keychain | grep "OpenWhisper Release" | head -1 | awk -F'"' '{print $2}')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project OpenWhisper/OpenWhisper.xcodeproj -scheme OpenWhisper

      - name: Archive
        run: |
          xcodebuild archive \
            -project OpenWhisper/OpenWhisper.xcodeproj \
            -scheme OpenWhisper \
            -configuration Release \
            -archivePath /tmp/OpenWhisper.xcarchive \
            CODE_SIGN_IDENTITY="${CODESIGN_IDENTITY}" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain /tmp/build.keychain"

      - name: Sign app bundle with entitlements
        run: |
          APP_PATH="/tmp/OpenWhisper.xcarchive/Products/Applications/OpenWhisper.app"
          # Deep sign all nested frameworks and binaries first, then the app
          find "$APP_PATH" -type d -name "*.framework" -o -type f -perm +111 | while read item; do
            codesign --force --sign "${CODESIGN_IDENTITY}" --keychain /tmp/build.keychain \
              --options runtime "$item" 2>/dev/null || true
          done
          codesign --force --deep --sign "${CODESIGN_IDENTITY}" --keychain /tmp/build.keychain \
            --entitlements OpenWhisper/OpenWhisper/OpenWhisper.entitlements \
            --options runtime "$APP_PATH"
          # Verify signature
          codesign --verify --verbose "$APP_PATH"

      - name: Package .zip
        run: |
          cp -R "/tmp/OpenWhisper.xcarchive/Products/Applications/OpenWhisper.app" /tmp/OpenWhisper.app
          cd /tmp && ditto -c -k --keepParent OpenWhisper.app OpenWhisper.zip

      - name: Install Sparkle tools
        run: |
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-for-Swift-Package-Manager.zip" \
            -o /tmp/sparkle-spm.zip
          unzip -q /tmp/sparkle-spm.zip -d /tmp/sparkle-spm

      - name: Sign update and generate appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/OpenWhisper.zip"
          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | /tmp/sparkle-spm/bin/sign_update --ed-key-file - -p /tmp/OpenWhisper.zip)
          FILE_SIZE=$(stat -f%z /tmp/OpenWhisper.zip)

          cat > /tmp/appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>OpenWhisper</title>
              <link>https://github.com/${{ github.repository }}</link>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>$(date -R)</pubDate>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  sparkle:version="${VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${FILE_SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$VERSION" \
            /tmp/OpenWhisper.zip \
            /tmp/appcast.xml \
            --title "OpenWhisper $VERSION" \
            --generate-notes
