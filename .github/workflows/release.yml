name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*'
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project OpenWhisper/OpenWhisper.xcodeproj -scheme OpenWhisper

      - name: Archive
        run: |
          xcodebuild archive \
            -project OpenWhisper/OpenWhisper.xcodeproj \
            -scheme OpenWhisper \
            -configuration Release \
            -archivePath /tmp/OpenWhisper.xcarchive \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .zip
        run: |
          cp -R "/tmp/OpenWhisper.xcarchive/Products/Applications/OpenWhisper.app" /tmp/OpenWhisper.app
          cd /tmp && ditto -c -k --keepParent OpenWhisper.app OpenWhisper.zip

      - name: Install Sparkle tools
        run: |
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-for-Swift-Package-Manager.zip" \
            -o /tmp/sparkle-spm.zip
          unzip -q /tmp/sparkle-spm.zip -d /tmp/sparkle-spm

      - name: Sign update and generate appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/OpenWhisper.zip"
          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | /tmp/sparkle-spm/bin/sign_update --ed-key-file - -p /tmp/OpenWhisper.zip)
          FILE_SIZE=$(stat -f%z /tmp/OpenWhisper.zip)

          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>OpenWhisper</title>
              <link>https://github.com/${{ github.repository }}</link>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>$(date -R)</pubDate>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  sparkle:version="${VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${FILE_SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Commit appcast.xml to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: update appcast.xml for ${VERSION}"
          git push origin HEAD:main

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$VERSION" \
            /tmp/OpenWhisper.zip \
            --title "OpenWhisper $VERSION" \
            --generate-notes
