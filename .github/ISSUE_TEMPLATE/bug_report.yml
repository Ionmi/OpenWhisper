name: Bug Report
description: Report a bug in OpenWhisper
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open OpenWhisper
        2. Press Option + Space
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. macOS 26.0
    validations:
      required: true
  - type: input
    id: whisper-model
    attributes:
      label: Whisper model
      placeholder: e.g. base, small, large-v3
  - type: textarea
    id: logs
    attributes:
      label: Console logs
      description: Any relevant logs from Console.app (filter by "OpenWhisper").
      render: shell
